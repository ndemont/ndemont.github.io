<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin Doctor — The cure for your lunch indecision</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:         #070B12;
            --surface:    #111827;
            --surface-2:  #1A2539;
            --border:     rgba(255,255,255,0.07);
            --border-hi:  rgba(255,255,255,0.14);
            --text:       #EEF2FF;
            --muted:      #64748B;
            --dim:        #94A3B8;
            --cyan:       #22D3EE;
            --cyan-glow:  rgba(34,211,238,0.18);
            --red:        #F87171;
            --red-glow:   rgba(248,113,113,0.25);
            --purple:     #818CF8;
        }

        [data-theme="light"] {
            --bg:         #F8FAFC;
            --surface:    #FFFFFF;
            --surface-2:  #F1F5F9;
            --border:     rgba(0,0,0,0.08);
            --border-hi:  rgba(0,0,0,0.14);
            --text:       #0F172A;
            --muted:      #64748B;
            --dim:        #475569;
            --cyan:       #06B6D4;
            --cyan-glow:  rgba(6,182,212,0.15);
            --red:        #EF4444;
            --red-glow:   rgba(239,68,68,0.2);
            --purple:     #6366F1;
        }

        html[data-theme-transitioning] * {
            transition: background-color 0.3s ease,
                        color 0.3s ease,
                        border-color 0.3s ease,
                        box-shadow 0.3s ease !important;
        }

        html { height: 100%; }

        body {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2.5rem 1rem 4rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
            background-size: 44px 44px;
            pointer-events: none; z-index: 0;
        }

        .blob {
            position: fixed; border-radius: 50%;
            filter: blur(90px); pointer-events: none; z-index: 0;
        }
        .blob-1 {
            width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(34,211,238,0.07) 0%, transparent 65%);
            top: -300px; left: -250px;
        }
        .blob-2 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(248,113,113,0.07) 0%, transparent 65%);
            bottom: -200px; right: -200px;
        }

        .page {
            position: relative; z-index: 1;
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 580px;
        }

        /* ── Header ─────────────────────────────── */
        .header {
            text-align: center; margin-bottom: 2.25rem;
            animation: fadeDown 0.6s ease both;
        }
        .logo-row {
            display: flex; align-items: center; justify-content: center;
            gap: 0.75rem; margin-bottom: 0.4rem;
        }
        .logo-icon { font-size: 2.8rem; line-height: 1; }
        .logo-text {
            font-size: clamp(2.4rem, 8vw, 3.5rem);
            font-weight: 800; letter-spacing: -0.03em; line-height: 1;
            background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 50%, var(--red) 100%);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        .tagline { color: var(--muted); font-size: 0.95rem; font-weight: 500; }

        /* ── Loading ─────────────────────────────── */
        .loading {
            display: flex; flex-direction: column; align-items: center;
            padding: 4rem 2rem; gap: 1rem;
        }
        .loading-ring {
            width: 52px; height: 52px;
            border: 3px solid var(--surface-2);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        .loading-text { color: var(--muted); font-size: 0.9rem; font-weight: 500; }

        /* ── App ─────────────────────────────────── */
        .app { display: none; flex-direction: column; align-items: center; width: 100%; gap: 1.75rem; }
        .app.visible { display: flex; animation: fadeIn 0.5s ease both; }

        /* ── Location Selector ───────────────────── */
        .loc-selector {
            display: none; flex-wrap: wrap; gap: 0.5rem;
            justify-content: center; max-width: 520px;
        }
        .loc-btn {
            padding: 0.45rem 0.9rem; border-radius: 9999px;
            border: 1px solid var(--border);
            cursor: pointer; font-family: inherit;
            font-size: 0.8rem; font-weight: 600;
            color: var(--muted); background: var(--surface);
            transition: all 0.2s ease; white-space: nowrap;
        }
        .loc-btn:hover:not(.active) { color: var(--dim); border-color: var(--border-hi); }
        .loc-btn.active {
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            color: #fff; border-color: transparent;
            box-shadow: 0 4px 16px var(--cyan-glow);
        }

        /* ── Location Dropdown ──────────────────────── */
        .loc-dropdown {
            position: fixed;
            top: 1rem;
            right: calc(40px + 2rem);
            z-index: 99;
        }

        .loc-trigger {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            border: 1px solid var(--border-hi);
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            color: #fff;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px var(--cyan-glow);
        }

        .loc-trigger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--cyan-glow);
        }

        .loc-trigger.active {
            background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 50%, var(--red) 100%);
        }

        .loc-arrow {
            display: inline-block;
            font-size: 0.7rem;
            transition: transform 0.3s ease;
        }

        .loc-trigger.open .loc-arrow {
            transform: rotate(180deg);
        }

        .loc-menu {
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 0.5rem;
            background: var(--surface-2);
            border: 1px solid var(--border-hi);
            border-radius: 1rem;
            padding: 0.75rem;
            display: none;
            flex-direction: column;
            gap: 0.5rem;
            min-width: 180px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            opacity: 0;
            transform: translateY(-10px) scale(0.95);
            transition: all 0.2s ease;
            pointer-events: none;
        }

        .loc-dropdown.open .loc-menu {
            display: flex;
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .loc-menu-item {
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.15s ease;
            text-align: left;
        }

        .loc-menu-item:hover {
            background: var(--surface);
            color: var(--text);
            border-color: var(--border-hi);
        }

        .loc-menu-item.selected {
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            color: #fff;
            border-color: transparent;
        }

        /* ── Sound Dropdown ──────────────────────── */
        .sound-dropdown {
            position: fixed;
            top: 1rem;
            right: calc(200px + 2rem);
            z-index: 99;
        }

        .sound-trigger {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            border: 1px solid var(--border-hi);
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            color: #fff;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px var(--cyan-glow);
        }

        .sound-trigger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--cyan-glow);
        }

        .sound-trigger.open {
            background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 50%, var(--red) 100%);
        }

        .sound-trigger.muted {
            background: var(--surface-2);
            color: var(--muted);
            border-color: var(--border-hi);
            box-shadow: none;
        }

        .sound-trigger.muted:hover {
            transform: none;
            box-shadow: none;
        }

        .sound-arrow {
            display: inline-block;
            font-size: 0.7rem;
            transition: transform 0.3s ease;
        }

        .sound-trigger.open .sound-arrow {
            transform: rotate(180deg);
        }

        .sound-menu {
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 0.5rem;
            background: var(--surface-2);
            border: 1px solid var(--border-hi);
            border-radius: 1rem;
            padding: 0.75rem;
            display: none;
            flex-direction: column;
            gap: 0.5rem;
            min-width: 180px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            opacity: 0;
            transform: translateY(-10px) scale(0.95);
            transition: all 0.2s ease;
            pointer-events: none;
        }

        .sound-dropdown.open .sound-menu {
            display: flex;
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .sound-menu-item {
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.15s ease;
            text-align: left;
        }

        .sound-menu-item:hover {
            background: var(--surface);
            border-color: var(--border-hi);
        }

        .sound-menu-item.selected {
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            color: #fff;
            border-color: transparent;
        }

        /* ── Wheel ───────────────────────────────── */
        .wheel-section { display: flex; flex-direction: column; align-items: center; gap: 1.75rem; width: 100%; }
        .wheel-wrap {
            position: relative;
            width: clamp(290px, 82vw, 440px);
            height: clamp(290px, 82vw, 440px);
        }

        .wheel-ring {
            position: absolute; inset: -10px; border-radius: 50%;
            border: 1px solid rgba(34,211,238,0.12);
            box-shadow: 0 0 50px rgba(34,211,238,0.06), inset 0 0 50px rgba(34,211,238,0.03);
            pointer-events: none;
        }
        .pointer {
            position: absolute; top: -18px; left: 50%;
            transform: translateX(-50%); z-index: 10;
        }
        .pointer-arrow {
            width: 0; height: 0;
            border-left: 14px solid transparent; border-right: 14px solid transparent;
            border-top: 28px solid var(--red);
            filter: drop-shadow(0 0 10px rgba(248,113,113,0.9));
        }
        #wheelSvg {
            width: 100%; height: 100%;
            transform-origin: center; transform-box: fill-box;
            filter: drop-shadow(0 20px 60px rgba(0,0,0,0.65));
            will-change: transform;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .wheel-wrap.loaded #wheelSvg {
            opacity: 1;
        }

        /* Wheel inner loading */
        .wheel-loader {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.3s ease;
            z-index: 20;
        }
    .wheel-loader-ring {
            width: 40px; height: 40px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: block;
        }
        /* Hide loader when wheel is loaded */
        .wheel-wrap.loaded .wheel-loader {
            opacity: 0;
            pointer-events: none;
        }
        .wheel-wrap.fetching .wheel-loader-ring { display: block; }
        .wheel-wrap.fetching #wheelSvg { opacity: 0.3; }

        /* Wheel center - stays fixed, doesn't rotate */
        .wheel-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .wheel-wrap.loaded .wheel-center {
            opacity: 1;
        }

        .wheel-center-circle {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            line-height: 1;
        }

        /* ── Spin Button ─────────────────────────── */
        .spin-wrap { position: relative; display: inline-block; }
        .spin-glow {
            position: absolute; inset: -10px; border-radius: 9999px;
            background: linear-gradient(135deg, var(--red), #EC4899);
            filter: blur(16px); opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
        }
        .spin-wrap:hover .spin-glow { opacity: 0.55; }
        .spin-btn {
            position: relative; padding: 1rem 3.25rem; border-radius: 9999px;
            border: none; cursor: pointer; font-family: inherit;
            font-size: 1rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
            color: #fff; background: linear-gradient(135deg, #F87171, #EC4899);
            box-shadow: 0 8px 32px var(--red-glow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .spin-btn::before {
            content: ''; position: absolute; inset: 1px; border-radius: 9999px;
            background: linear-gradient(160deg, rgba(255,255,255,0.18) 0%, transparent 55%);
            pointer-events: none;
        }
        .spin-btn:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 14px 40px rgba(248,113,113,0.5); }
        .spin-btn:active { transform: scale(0.97); }
        .spin-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

        /* ── Result Modal ────────────────────────── */
        .modal-backdrop {
            position: fixed; inset: 0;
            background: rgba(7,11,18,0.82);
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            z-index: 200; display: flex; align-items: center; justify-content: center;
            padding: 1.5rem; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-backdrop.visible { opacity: 1; pointer-events: auto; }

        .result-card {
            background: var(--surface); border: 1px solid var(--border-hi);
            border-radius: 1.75rem; padding: 2rem 2.25rem;
            width: 100%; max-width: 400px; text-align: center; position: relative;
            transform: translateY(24px) scale(0.95);
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
        }
        .modal-backdrop.visible .result-card { transform: translateY(0) scale(1); }

        .modal-close {
            position: absolute; top: 1rem; right: 1rem;
            width: 28px; height: 28px; border-radius: 50%;
            border: 1px solid var(--border-hi); background: var(--surface-2);
            color: var(--muted); font-size: 0.9rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s ease;
        }
        .modal-close:hover { background: var(--red); color: #fff; border-color: var(--red); }

        .rx-row { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 0.75rem; }
        .rx-badge {
            font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em;
            color: var(--cyan); border: 1px solid rgba(34,211,238,0.35);
            background: var(--cyan-glow); border-radius: 0.3rem; padding: 0.2rem 0.55rem;
        }
        .rx-label { color: var(--muted); font-size: 0.82rem; }

        .result-name {
            font-size: clamp(1.4rem, 5vw, 1.9rem); font-weight: 700;
            letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #F87171, #FBBF24);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        .result-addr {
            display: flex; align-items: center; justify-content: center;
            gap: 0.375rem; color: var(--muted); font-size: 0.82rem; margin-bottom: 1.25rem;
        }
        .maps-btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.625rem 1.5rem; border-radius: 9999px;
            background: var(--surface-2); border: 1px solid var(--border-hi);
            color: var(--text); text-decoration: none; font-family: inherit;
            font-size: 0.85rem; font-weight: 600; transition: all 0.2s ease;
        }
        .maps-btn:hover {
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            color: #fff; border-color: transparent;
            box-shadow: 0 4px 20px var(--cyan-glow);
        }

        /* ── Footer ──────────────────────────────── */
        .footer { margin-top: 1rem; text-align: center; color: var(--muted); font-size: 0.78rem; line-height: 1.9; }
        .footer-main { color: var(--dim); font-weight: 600; }
        .footer a { color: inherit; text-decoration: underline; text-underline-offset: 3px; }

        /* ── Confetti ─────────────────────────────── */
        #confettiCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 999; }

        /* ── Theme Toggle ────────────────────────── */
        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border-hi);
            background: var(--surface-2);
            color: var(--text);
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 100;
        }
        .theme-toggle:hover {
            background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 50%, var(--red) 100%);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 20px var(--cyan-glow);
        }

        /* Light mode overrides */
        [data-theme="light"] body::before {
            background-image:
                linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px);
        }

        [data-theme="light"] .blob-1 {
            background: radial-gradient(circle, rgba(6,182,212,0.04) 0%, transparent 65%);
        }

        [data-theme="light"] .blob-2 {
            background: radial-gradient(circle, rgba(239,68,68,0.04) 0%, transparent 65%);
        }

        [data-theme="light"] .modal-backdrop {
            background: rgba(248,250,252,0.72);
        }

        [data-theme="light"] .wheel-center-circle {
            background: #FFFFFF;
            border-color: rgba(0,0,0,0.1);
        }

        /* ── Keyframes ───────────────────────────── */
        @keyframes fadeIn   { from { opacity: 0; }                          to { opacity: 1; } }
        @keyframes fadeDown { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin     { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <canvas id="confettiCanvas"></canvas>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()"
            aria-label="Toggle theme">☀️</button>

    <div class="sound-dropdown" id="soundDropdown">
        <button class="sound-trigger" id="soundTrigger" onclick="toggleSoundDropdown()">
            <span id="soundIcon">🔊</span>
            <span id="soundName">Classic Pinball</span>
            <span class="sound-arrow">▼</span>
        </button>
        <div class="sound-menu" id="soundMenu">
            <button class="sound-menu-item selected" onclick="selectSound('classic'); toggleSoundDropdown()">🎰 Classic Pinball</button>
            <button class="sound-menu-item" onclick="selectSound('click'); toggleSoundDropdown()">⚙️ Mechanical Click</button>
            <button class="sound-menu-item" onclick="selectSound('bell'); toggleSoundDropdown()">🔔 Soft Bell</button>
            <button class="sound-menu-item" onclick="selectSound('gameshow'); toggleSoundDropdown()">🎮 Game Show</button>
            <button class="sound-menu-item" onclick="selectSound('muted'); toggleSoundDropdown()">🔇 Muted</button>
        </div>
    </div>

    <div class="loc-dropdown" id="locDropdown">
        <button class="loc-trigger" id="locTrigger" onclick="toggleLocDropdown()">
            <span id="locName">🇩🇪 K11 Berlin</span>
            <span class="loc-arrow">▼</span>
        </button>
        <div class="loc-menu" id="locMenu">
            <button class="loc-menu-item selected" onclick="selectLocation('k11'); toggleLocDropdown()">🇩🇪 K11 Berlin</button>
            <button class="loc-menu-item" onclick="selectLocation('m51'); toggleLocDropdown()">🇩🇪 M51 Berlin</button>
            <button class="loc-menu-item" onclick="selectLocation('levallois'); toggleLocDropdown()">🇫🇷 Levallois</button>
            <button class="loc-menu-item" onclick="selectLocation('nantes'); toggleLocDropdown()">🇫🇷 Nantes</button>
            <button class="loc-menu-item" onclick="selectLocation('niort'); toggleLocDropdown()">🇫🇷 Niort</button>
            <button class="loc-menu-item" onclick="selectLocation('milan'); toggleLocDropdown()">🇮🇹 Milan</button>
            <button class="loc-menu-item" onclick="selectLocation('amsterdam'); toggleLocDropdown()">🇳🇱 Amsterdam</button>
        </div>
    </div>

    <div class="page">
        <header class="header">
            <div class="logo-row">
                <span class="logo-icon">🩺</span>
                <h1 class="logo-text">Spin Doctor</h1>
            </div>
            <p class="tagline">The cure for your lunch indecision</p>
        </header>

        <div class="loading" id="loading">
            <div class="loading-ring"></div>
            <p class="loading-text">Locating your office…</p>
        </div>

        <main class="app" id="app">

            <div class="loc-selector" id="locSelector">

    function checkBoundaryCrossing(rotation, numSegments, prevRotation) {
        const segmentAngle = 360 / numSegments;

        // Normalize rotations to 0-360 range for comparison
        const normalizeAngle = (angle) => {
            const mod = angle % 360;
            return mod < 0 ? mod + 360 : mod;
        };

        const currNormalized = normalizeAngle(rotation);
        const prevNormalized = normalizeAngle(prevRotation);

        // Calculate which boundary zone we're in
        // Boundaries are at angles 0, segmentAngle, 2*segmentAngle, etc.
        const currBoundary = Math.floor(currNormalized / segmentAngle);
        const prevBoundary = Math.floor(prevNormalized / segmentAngle);

        // Count how many boundaries we've crossed
        let boundariesToCross = currBoundary - prevBoundary;

        // Handle wrap-around (e.g., going from 355° to 5° crosses the 0°/360° boundary)
        if (boundariesToCross < 0) {
            boundariesToCross += numSegments;
        }

        // Play a tick for each boundary crossed
        for (let i = 0; i < boundariesToCross; i++) {
            playTickSound();
        }
    }

    // ── Fetch (lazy, per-location) ────────────────────────────────────────────
    async function ensureRestaurants(key) {
        const loc = LOCATIONS[key];
        if (loc.restaurants !== null) return;
        if (fetchingLoc === key) return;
        fetchingLoc = key;

        document.getElementById('wheelWrap').classList.add('fetching');

        const { lat, lng, city } = loc;
        const d = 0.005; // ~550 m radius

        // Multiple amenity types to query for better variety
        const amenityTypes = ['restaurant', 'cafe', 'fast_food', 'pub', 'pizzeria', 'burger'];

        // Slightly offset positions to get variety while staying within radius
        const offsets = [
            { lat: 0, lng: 0 },       // Center
            { lat: 0.002, lng: 0 },    // North
            { lat: -0.002, lng: 0 },   // South
            { lat: 0, lng: 0.002 },    // East
            { lat: 0, lng: -0.002 }    // West
        ];

        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 15000);

        try {
            // Fetch from multiple queries
            const queries = [];
            for (const amenity of amenityTypes) {
                for (const offset of offsets) {
                    const qLat = lat + offset.lat;
                    const qLng = lng + offset.lng;
                    const query = `[out:json][timeout:12];node["amenity"="${amenity}"](${qLat-d},${qLng-d},${qLat+d},${qLng+d});out 10;`;
                    queries.push(
                        fetch('https://overpass-api.de/api/interpreter', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: 'data=' + encodeURIComponent(query),
                            signal: controller.signal
                        }).then(res => {
                            if (!res.ok) throw new Error('HTTP ' + res.status);
                            return res.json();
                        }).catch(() => ({ elements: [] }))
                    );
                }
            }

            const results = await Promise.all(queries);

            // Combine all results, deduplicate by location
            const seen = new Set();
            const list = [];

            for (const data of results) {
                if (!data.elements) continue;
                for (const el of data.elements) {
                    if (!el.tags || !el.tags.name || !el.lat || !el.lon) continue;

                    // Use location as unique key to avoid duplicates
                    const key = `${el.lat.toFixed(5)},${el.lon.toFixed(5)}`;
                    if (seen.has(key)) continue;
                    seen.add(key);

                    const street = el.tags['addr:full'] ||
                        (el.tags['addr:street']
                            ? `${el.tags['addr:street']} ${el.tags['addr:housenumber'] || ''}`.trim()
                            : '');
                    const address = street ? `${street}, ${city}` : city;
                    list.push({ displayName: el.tags.name, address, lat: el.lat, lng: el.lon });
                }
            }

            // Shuffle the list for randomness
            for (let i = list.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [list[i], list[j]] = [list[j], list[i]];
            }

            loc.restaurants = list.length >= 3 ? list.slice(0, 12) : FALLBACKS[key];
        } catch {
            clearTimeout(timer);
            loc.restaurants = FALLBACKS[key];
        }

        fetchingLoc = null;
        document.getElementById('wheelWrap').classList.remove('fetching');
    }

    // ── SVG helpers ──────────────────────────────────────────────────────────
    function svgEl(tag) { return document.createElementNS('http://www.w3.org/2000/svg', tag); }

    function polarToXY(deg, r) {
        const rad = (deg - 90) * Math.PI / 180;
        return { x: r * Math.cos(rad), y: r * Math.sin(rad) };
    }

    function trunc(str, max) { return str.length > max ? str.slice(0, max - 1) + '…' : str; }

    // ── Draw Wheel ───────────────────────────────────────────────────────────
    function drawWheel() {
        const group       = document.getElementById('wheelSegments');
        group.innerHTML   = '';
        const restaurants = LOCATIONS[currentLocation].restaurants || [];
        if (!restaurants.length) return;

        const n        = restaurants.length;
        const segAngle = 360 / n;
        const R        = 192;
        const textR    = R * 0.63;
        const maxChars = n <= 6 ? 16 : n <= 9 ? 13 : 10;
        const fontSize = n <= 6 ? 13  : n <= 9 ? 11  : 9.5;

        restaurants.forEach((r, i) => {
            const startAngle = i * segAngle;
            const midAngle   = startAngle + segAngle / 2;
            const s = polarToXY(startAngle, R);
            const e = polarToXY((i + 1) * segAngle, R);
            const largeArc = segAngle > 180 ? 1 : 0;

            const path = svgEl('path');
            path.setAttribute('d', `M 0,0 L ${s.x.toFixed(2)},${s.y.toFixed(2)} A ${R},${R} 0 ${largeArc} 1 ${e.x.toFixed(2)},${e.y.toFixed(2)} Z`);
            path.setAttribute('fill', COLORS[i % COLORS.length]);
            path.setAttribute('stroke', 'rgba(0,0,0,0.28)');
            path.setAttribute('stroke-width', '1.5');
            group.appendChild(path);

            // Radial text: flip left-half segments so they stay legible
            const isLeftHalf    = midAngle > 180 && midAngle < 360;
            const textRotation  = isLeftHalf ? midAngle + 90 : midAngle - 90;
            const anchor        = isLeftHalf ? 'end' : 'start';
            const tp            = polarToXY(midAngle, textR - 10);

            const text = svgEl('text');
            text.setAttribute('x', tp.x.toFixed(2));
            text.setAttribute('y', tp.y.toFixed(2));
            text.setAttribute('text-anchor', anchor);
            text.setAttribute('dominant-baseline', 'central');
            text.setAttribute('fill', 'rgba(255,255,255,0.95)');
            text.setAttribute('font-family', "'Space Grotesk', system-ui, sans-serif");
            text.setAttribute('font-size', String(fontSize));
            text.setAttribute('font-weight', '600');
            text.setAttribute('transform', `rotate(${textRotation}, ${tp.x.toFixed(2)}, ${tp.y.toFixed(2)})`);
            text.textContent = trunc(r.displayName, maxChars);
            group.appendChild(text);
        });

        // Show wheel after it's loaded
        document.getElementById('wheelWrap').classList.add('loaded');
    }

        drawWheel();
    }

    // ── Force refresh restaurants ────────────────────────────────────────────
    async function forceRefreshRestaurants() {
        if (isSpinning) return;
        const loc = LOCATIONS[currentLocation];
        loc.restaurants = null;  // Clear cache
        document.getElementById('wheelWrap').classList.remove('loaded');  // Show loader again
        await ensureRestaurants(currentLocation);
        drawWheel();
    }

    function hideResult() { document.getElementById('resultModal').classList.remove('visible'); }
    function handleBackdropClick(e) { if (e.target.id === 'resultModal') hideResult(); }

    // ── Spin ─────────────────────────────────────────────────────────────────
    function spinWheel() {
        if (isSpinning) return;
        const restaurants = LOCATIONS[currentLocation].restaurants;
        if (!restaurants || !restaurants.length) return;

        isSpinning = true;
        document.getElementById('spinBtn').disabled = true;
        hideResult();

        const n        = restaurants.length;
        const segAngle = 360 / n;
        const targetIdx = Math.floor(Math.random() * n);

        // finalRotation brings targetIdx's midpoint under the pointer (12 o'clock)
        const midAngle   = targetIdx * segAngle + segAngle / 2;
        const target     = (360 - midAngle + 360) % 360;
        const curAngle   = ((currentRotation % 360) + 360) % 360;
        const delta      = ((target - curAngle) + 360) % 360;
        const extraSpins = (Math.floor(Math.random() * 4) + 5) * 360;
        const finalRot   = currentRotation + delta + extraSpins;

        const duration   = 12000 + Math.random() * 1000;
        const startTime  = performance.now();
        const startRot   = currentRotation;
        let prevRot      = startRot;

        function tick(now) {
            const t      = Math.min((now - startTime) / duration, 1);
            // Smooth deceleration: fast start → medium → slow → super slow at end
            const eased  = 1 - Math.pow(1 - t, 6);
            const currentRot = startRot + (finalRot - startRot) * eased;
            document.getElementById('wheelSvg').style.transform = `rotate(${currentRot}deg)`;

            // Play tick when crossing segment boundaries
            checkBoundaryCrossing(currentRot, n, prevRot);
            prevRot = currentRot;

            if (t < 1) {
                requestAnimationFrame(tick);
            } else {
                currentRotation = finalRot;
                isSpinning = false;
                document.getElementById('spinBtn').disabled = false;
                showResult(targetIdx);
            }
        }
        requestAnimationFrame(tick);
    }

    // ── Result ───────────────────────────────────────────────────────────────
    function showResult(idx) {
        const r = LOCATIONS[currentLocation].restaurants[idx];

        // Use search format which always shows a pin at coordinates, even if business isn't in Google's index.
        // This searches for the restaurant name near the coordinates and guarantees a visible pin.
        const mapsUrl = `https://www.google.com/maps/search/${encodeURIComponent(r.displayName)}/@${r.lat},${r.lng},18z`;

        // Update content
        document.getElementById('resultName').textContent = r.displayName;
        document.getElementById('resultAddr').textContent = r.address;
        document.getElementById('mapsLink').href          = mapsUrl;

        // Show modal and button immediately on next tick
        const modal = document.getElementById('resultModal');
        const btn = document.getElementById('spinBtn');

        // Add visible class and re-enable button
        modal.classList.add('visible');
        btn.disabled = false;

        // Force reflow to ensure immediate render
        void modal.offsetHeight;

        // Launch confetti after modal renders
        setTimeout(launchConfetti, 0);
    }

    // ── Confetti ─────────────────────────────────────────────────────────────
    const cCanvas = document.getElementById('confettiCanvas');
    const cCtx    = cCanvas.getContext('2d');
    let   cParts  = [];
    let   cRAF    = null;

    function resizeC() { cCanvas.width = window.innerWidth; cCanvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeC);
    resizeC();

    function launchConfetti() {
        cParts = [];
        if (cRAF) cancelAnimationFrame(cRAF);

        const cx = window.innerWidth / 2;
        const cy = window.innerHeight * 0.35;

        for (let i = 0; i < 140; i++) {
            const fromLeft = i < 70;
            const ox    = fromLeft ? cx - 80 : cx + 80;
            const angle = fromLeft
                ? (Math.random() * 80 - 140) * Math.PI / 180
                : (Math.random() * 80 - 40)  * Math.PI / 180;
            const speed = Math.random() * 10 + 5;
            cParts.push({
                x: ox, y: cy,
                vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                w: Math.random() * 9 + 4, h: Math.random() * 5 + 3,
                rot: Math.random() * 360, rotV: (Math.random() - 0.5) * 14,
                color: COLORS[Math.floor(Math.random() * COLORS.length)],
                opacity: 1, gravity: 0.28 + Math.random() * 0.12
            });
        }
        animateC();
    }

    function animateC() {
        cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
        cParts = cParts.filter(p => p.opacity > 0.01);
        cParts.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.vx *= 0.993; p.rot += p.rotV;
            if (p.y > cCanvas.height * 0.7) p.opacity -= 0.025;
            cCtx.save();
            cCtx.globalAlpha = Math.max(0, p.opacity);
            cCtx.translate(p.x, p.y); cCtx.rotate(p.rot * Math.PI / 180);
            cCtx.fillStyle = p.color;
            cCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            cCtx.restore();
        });
        if (cParts.length > 0) { cRAF = requestAnimationFrame(animateC); }
        else { cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height); }
    }

    // ── Geolocation → nearest office ─────────────────────────────────────────
    function nearestOffice(lat, lng) {
        let nearest = 'k11', minDist = Infinity;
        for (const [key, loc] of Object.entries(LOCATIONS)) {
            const dist = Math.hypot(loc.lat - lat, loc.lng - lng);
            if (dist < minDist) { minDist = dist; nearest = key; }
        }
        return nearest;
    }

    // ── Theme Management ─────────────────────────────────────────────────────
    const THEME_KEY = 'spin-doctor-theme';

    function getSystemTheme() {
        return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }

    function getStoredTheme() {
        return localStorage.getItem(THEME_KEY);
    }

    function setTheme(theme, withTransition = true) {
        const html = document.documentElement;

        if (withTransition) {
            html.setAttribute('data-theme-transitioning', '');
        }

        html.setAttribute('data-theme', theme);
        localStorage.setItem(THEME_KEY, theme);
        updateToggleIcon(theme);

        if (withTransition) {
            setTimeout(() => html.removeAttribute('data-theme-transitioning'), 300);
        }
    }

    function updateToggleIcon(theme) {
        const btn = document.getElementById('themeToggle');
        if (btn) {
            btn.innerHTML = theme === 'light' ? '🌙' : '☀️';
            btn.setAttribute('aria-label',
                theme === 'light' ? 'Switch to dark mode' : 'Switch to light mode');
        }
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme') || 'dark';
        const next = current === 'dark' ? 'light' : 'dark';
        setTheme(next);
    }

    function initTheme() {
        const stored = getStoredTheme();
        const initial = stored || getSystemTheme();
        setTheme(initial, false); // No transition on page load
    }

    // Listen for system theme changes
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', (e) => {
        if (!getStoredTheme()) {
            setTheme(e.matches ? 'light' : 'dark');
        }
    });

    // ── Location Dropdown ────────────────────────────────────────────────────
    function toggleLocDropdown() {
        const dropdown = document.getElementById('locDropdown');
        const trigger = document.getElementById('locTrigger');
        dropdown.classList.toggle('open');
        trigger.classList.toggle('open');
    }

    function updateLocDisplay(key) {
        const locNames = {
            k11: '🇩🇪 K11 Berlin',
            m51: '🇩🇪 M51 Berlin',
            levallois: '🇫🇷 Levallois',
            nantes: '🇫🇷 Nantes',
            niort: '🇫🇷 Niort',
            milan: '🇮🇹 Milan',
            amsterdam: '🇳🇱 Amsterdam'
        };

        document.getElementById('locName').textContent = locNames[key];

        // Update menu selection styles
        document.querySelectorAll('.loc-menu-item').forEach(item => {
            item.classList.remove('selected');
        });
        const locKeys = ['k11', 'm51', 'levallois', 'nantes', 'niort', 'milan', 'amsterdam'];
        document.querySelectorAll('.loc-menu-item')[locKeys.indexOf(key)].classList.add('selected');
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
        const dropdown = document.getElementById('locDropdown');
        const trigger = document.getElementById('locTrigger');
        if (!dropdown.contains(e.target) && dropdown.classList.contains('open')) {
            dropdown.classList.remove('open');
            trigger.classList.remove('open');
        }
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    async function init() {
        initTheme(); // Initialize theme before rendering
        initSound(); // Initialize sound preference

        // Show app shell first (location buttons visible immediately)
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').classList.add('visible');

        // Try geolocation with a 4 s timeout, fall back to k11
        let startKey = 'k11';
        try {
            startKey = await new Promise((resolve) => {
                if (!navigator.geolocation) { resolve('k11'); return; }
                const timer = setTimeout(() => resolve('k11'), 4000);
                navigator.geolocation.getCurrentPosition(
                    ({ coords }) => { clearTimeout(timer); resolve(nearestOffice(coords.latitude, coords.longitude)); },
                    ()          => { clearTimeout(timer); resolve('k11'); },
                    { timeout: 4000, maximumAge: 300000 }
                );
            });
        } catch { /* keep k11 */ }

        await selectLocation(startKey);
    }

    window.addEventListener('load', init);
    </script>
